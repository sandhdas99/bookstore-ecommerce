<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse our extensive catalog of books. Filter by category, price, and rating to find your perfect read.">
    <meta name="keywords" content="book catalog, browse books, filter books, search books">
    <title>Book Catalog - BookStore</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <!-- Navigation Header -->
    <header id="header" class="header">
        <nav class="navbar">
            <div class="container nav-container">
                <!-- Logo -->
                <a href="index.html" class="logo">
                    <span class="logo-icon">📚</span>
                    <span class="logo-text">BookStore</span>
                </a>
                
                <!-- Navigation Menu -->
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="catalog.html" class="nav-link">Catalog</a></li>
                    <li><a href="#categories" class="nav-link">Categories</a></li>
                    <li><a href="#about" class="nav-link">About</a></li>
                    <li><a href="#contact" class="nav-link">Contact</a></li>
                </ul>
                
                <!-- Search Bar -->
                <div class="search-bar">
                    <input type="text" class="search-input" placeholder="Search books..." aria-label="Search books">
                    <button class="search-btn" aria-label="Search">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                </div>
                
                <!-- Cart Icon -->
                <a href="cart.html" class="cart-icon" aria-label="Shopping cart">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-badge">0</span>
                </a>
                
                <!-- Mobile Menu Toggle -->
                <button class="menu-toggle" aria-label="Toggle menu">
                    <span class="hamburger"></span>
                    <span class="hamburger"></span>
                    <span class="hamburger"></span>
                </button>
            </div>
        </nav>
    </header>

    <!-- Catalog Page -->
    <main id="catalog-page">
        <!-- Filter Sidebar -->
        <aside id="filter-sidebar">
            <!-- Filters will be added in Phase 4 -->
        </aside>

        <!-- Book Grid -->
        <section id="book-grid">
            <!-- Book cards will be added in Phase 4 -->
        </section>
    </main>

    <!-- Footer -->
    <footer id="footer">
        <!-- Footer content -->
    </footer>

    <script src="js/data.js"></script>
    <script src="js/search.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
