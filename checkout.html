<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Complete your purchase securely. Enter your shipping and payment information.">
    <meta name="keywords" content="checkout, payment, order, purchase">
    <title>Checkout - BookStore</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <!-- Navigation Header -->
    <header id="header" class="header">
        <nav class="navbar">
            <div class="container nav-container">
                <!-- Logo -->
                <a href="index.html" class="logo">
                    <span class="logo-icon">📚</span>
                    <span class="logo-text">BookStore</span>
                </a>
                
                <!-- Navigation Menu -->
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="catalog.html" class="nav-link">Catalog</a></li>
                    <li><a href="#categories" class="nav-link">Categories</a></li>
                    <li><a href="#about" class="nav-link">About</a></li>
                    <li><a href="#contact" class="nav-link">Contact</a></li>
                </ul>
                
                <!-- Search Bar -->
                <div class="search-bar">
                    <input type="text" class="search-input" placeholder="Search books..." aria-label="Search books">
                    <button class="search-btn" aria-label="Search">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                </div>
                
                <!-- Cart Icon -->
                <a href="cart.html" class="cart-icon" aria-label="Shopping cart">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-badge">0</span>
                </a>
                
                <!-- Mobile Menu Toggle -->
                <button class="menu-toggle" aria-label="Toggle menu">
                    <span class="hamburger"></span>
                    <span class="hamburger"></span>
                    <span class="hamburger"></span>
                </button>
            </div>
        </nav>
    </header>

    <!-- Checkout Page -->
    <main id="checkout-page" class="checkout-page">
        <div class="container">
            <h1 class="page-title">Checkout</h1>
            
            <!-- Progress Indicator -->
            <div class="checkout-progress">
                <div class="progress-step active" data-step="1">
                    <div class="step-number">1</div>
                    <div class="step-label">Information</div>
                </div>
                <div class="progress-line"></div>
                <div class="progress-step" data-step="2">
                    <div class="step-number">2</div>
                    <div class="step-label">Shipping</div>
                </div>
                <div class="progress-line"></div>
                <div class="progress-step" data-step="3">
                    <div class="step-number">3</div>
                    <div class="step-label">Payment</div>
                </div>
            </div>
            
            <div class="checkout-layout">
                <!-- Checkout Form -->
                <section id="checkout-form" class="checkout-form-section">
                    <form id="checkout-form-element">
                        <!-- Step 1: Customer Information -->
                        <div class="form-step active" data-step="1">
                            <h2 class="form-step-title">Customer Information</h2>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="first-name">First Name *</label>
                                    <input type="text" id="first-name" name="firstName" required>
                                    <span class="error-message"></span>
                                </div>
                                <div class="form-group">
                                    <label for="last-name">Last Name *</label>
                                    <input type="text" id="last-name" name="lastName" required>
                                    <span class="error-message"></span>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label for="email">Email Address *</label>
                                <input type="email" id="email" name="email" required>
                                <span class="error-message"></span>
                            </div>
                            
                            <div class="form-group">
                                <label for="phone">Phone Number *</label>
                                <input type="tel" id="phone" name="phone" required>
                                <span class="error-message"></span>
                            </div>
                            
                            <div class="form-actions">
                                <button type="button" class="btn btn-primary btn-lg" onclick="nextStep()">
                                    Continue to Shipping
                                </button>
                            </div>
                        </div>
                        
                        <!-- Step 2: Shipping Address -->
                        <div class="form-step" data-step="2">
                            <h2 class="form-step-title">Shipping Address</h2>
                            
                            <div class="form-group">
                                <label for="address">Street Address *</label>
                                <input type="text" id="address" name="address" required>
                                <span class="error-message"></span>
                            </div>
                            
                            <div class="form-group">
                                <label for="apartment">Apartment, Suite, etc. (Optional)</label>
                                <input type="text" id="apartment" name="apartment">
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="city">City *</label>
                                    <input type="text" id="city" name="city" required>
                                    <span class="error-message"></span>
                                </div>
                                <div class="form-group">
                                    <label for="state">State *</label>
                                    <input type="text" id="state" name="state" required>
                                    <span class="error-message"></span>
                                </div>
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="zip">ZIP Code *</label>
                                    <input type="text" id="zip" name="zip" required>
                                    <span class="error-message"></span>
                                </div>
                                <div class="form-group">
                                    <label for="country">Country *</label>
                                    <select id="country" name="country" required>
                                        <option value="">Select Country</option>
                                        <option value="IN" selected>India</option>
                                        <option value="US">United States</option>
                                        <option value="UK">United Kingdom</option>
                                        <option value="CA">Canada</option>
                                    </select>
                                    <span class="error-message"></span>
                                </div>
                            </div>
                            
                            <div class="form-actions">
                                <button type="button" class="btn btn-secondary" onclick="prevStep()">
                                    Back
                                </button>
                                <button type="button" class="btn btn-primary btn-lg" onclick="nextStep()">
                                    Continue to Payment
                                </button>
                            </div>
                        </div>
                        
                        <!-- Step 3: Payment Method -->
                        <div class="form-step" data-step="3">
                            <h2 class="form-step-title">Payment Method</h2>
                            
                            <div class="payment-methods">
                                <label class="payment-option">
                                    <input type="radio" name="paymentMethod" value="card" checked>
                                    <div class="payment-option-content">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                                            <line x1="1" y1="10" x2="23" y2="10"></line>
                                        </svg>
                                        <span>Credit/Debit Card</span>
                                    </div>
                                </label>
                                
                                <label class="payment-option">
                                    <input type="radio" name="paymentMethod" value="upi">
                                    <div class="payment-option-content">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                                        </svg>
                                        <span>UPI</span>
                                    </div>
                                </label>
                                
                                <label class="payment-option">
                                    <input type="radio" name="paymentMethod" value="cod">
                                    <div class="payment-option-content">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <line x1="12" y1="1" x2="12" y2="23"></line>
                                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                                        </svg>
                                        <span>Cash on Delivery</span>
                                    </div>
                                </label>
                            </div>
                            
                            <div id="card-details" class="card-details">
                                <div class="form-group">
                                    <label for="card-number">Card Number *</label>
                                    <input type="text" id="card-number" name="cardNumber" placeholder="1234 5678 9012 3456">
                                    <span class="error-message"></span>
                                </div>
                                
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="expiry">Expiry Date *</label>
                                        <input type="text" id="expiry" name="expiry" placeholder="MM/YY">
                                        <span class="error-message"></span>
                                    </div>
                                    <div class="form-group">
                                        <label for="cvv">CVV *</label>
                                        <input type="text" id="cvv" name="cvv" placeholder="123" maxlength="3">
                                        <span class="error-message"></span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="form-actions">
                                <button type="button" class="btn btn-secondary" onclick="prevStep()">
                                    Back
                                </button>
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Place Order
                                </button>
                            </div>
                        </div>
                    </form>
                </section>

                <!-- Order Summary -->
                <aside id="order-summary" class="order-summary">
                    <h2 class="summary-title">Order Summary</h2>
                    
                    <div id="order-items" class="order-items">
                        <!-- Order items will be loaded dynamically -->
                    </div>
                    
                    <div class="summary-divider"></div>
                    
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="order-subtotal">₹0</span>
                    </div>
                    
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span id="order-shipping">₹0</span>
                    </div>
                    
                    <div class="summary-row">
                        <span>Tax (GST 18%)</span>
                        <span id="order-tax">₹0</span>
                    </div>
                    
                    <div class="summary-divider"></div>
                    
                    <div class="summary-row summary-total">
                        <span>Total</span>
                        <span id="order-total">₹0</span>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer id="footer">
        <!-- Footer content -->
    </footer>

    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/checkout.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
